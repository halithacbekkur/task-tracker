<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Günlük alışkanlıklarınızı ve hedeflerinizi haftalık istatistiklerle takip eden kişisel görev takip uygulaması.">
  <title>TaskGrid — Kişisel Görev Takibi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Summary Banner -->
  <header id="app-header">
    <div class="header-content">
      <div class="brand">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="10" height="10" rx="2" fill="#7c5cfc"/>
            <rect x="16" y="2" width="10" height="10" rx="2" fill="#5ce0d8"/>
            <rect x="2" y="16" width="10" height="10" rx="2" fill="#5ce0d8"/>
            <rect x="16" y="16" width="10" height="10" rx="2" fill="#7c5cfc" opacity="0.5"/>
          </svg>
        </div>
        <h1>TaskGrid</h1>
      </div>
      <div class="week-summary" id="week-summary" title="Haftalık özet">
        <span class="summary-label">Bu hafta</span>
        <span class="summary-value" id="week-percent">0%</span>
        <div class="summary-bar">
          <div class="summary-bar-fill" id="week-bar-fill"></div>
        </div>
      </div>
      <div class="header-actions" title="Ayarlar">
        <button id="btn-theme-toggle" class="icon-btn" title="Tema değiştir" aria-label="Tema değiştir">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app-main">
    <!-- Controls Bar -->
    <div class="controls-bar" id="controls-bar">
      <button id="btn-add-category" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Kategori Ekle
      </button>
      <button id="btn-reset-week" class="btn btn-ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Haftayı Sıfırla
      </button>
    </div>

    <!-- Spreadsheet Table -->
    <div class="table-wrapper" id="table-wrapper">
      <table id="task-table">
        <thead id="table-head">
          <!-- Generated by JS -->
        </thead>
        <tbody id="table-body">
          <!-- Generated by JS -->
        </tbody>
        <tfoot id="table-foot">
          <!-- Generated by JS -->
        </tfoot>
      </table>
    </div>

    <!-- Notes Section -->
    <section class="notes-section" id="notes-section">
      <div class="notes-header">
        <div class="notes-title-area">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <h2>Önemli Notlar</h2>
          <span class="notes-count" id="notes-count"></span>
        </div>
        <div class="notes-actions">
          <div class="notes-search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="notes-search" placeholder="Not ara..." autocomplete="off">
          </div>
          <button id="btn-add-note" class="btn btn-primary btn-sm">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Yeni Not
          </button>
        </div>
      </div>
      <div class="notes-grid" id="notes-grid">
        <!-- Generated by JS -->
      </div>
    </section>

    <!-- Week History -->
    <section class="history-section" id="history-section">
      <button class="history-toggle" id="history-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Arşivlenmiş Haftalar</span>
        <span class="history-count" id="history-count"></span>
        <svg class="history-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="history-panel" id="history-panel">
        <div class="history-list" id="history-list">
          <!-- Generated by JS -->
        </div>
      </div>
    </section>
  </main>

  <!-- Note Editor Modal -->
  <div class="modal-overlay" id="modal-note-overlay">
    <div class="modal modal-note" id="modal-note-editor">
      <div class="modal-header">
        <h2 id="note-modal-title">Yeni Not</h2>
        <button class="modal-close" id="modal-note-close" aria-label="Kapat">&times;</button>
      </div>
      <div class="modal-body note-editor-body">
        <label for="input-note-title">Başlık</label>
        <input type="text" id="input-note-title" placeholder="Notun başlığı..." maxlength="100" autocomplete="off">
        <label for="input-note-content">İçerik</label>
        <textarea id="input-note-content" placeholder="Notunuzu buraya yazın..." rows="6"></textarea>
        <div class="note-date-row">
          <div class="note-option-group">
            <label for="input-note-date">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Tarih <span class="label-hint">(opsiyonel)</span>
            </label>
            <input type="date" id="input-note-date">
          </div>
        </div>
        <div class="note-editor-options">
          <div class="note-option-group">
            <label>Renk</label>
            <div class="note-color-picker" id="note-color-picker">
              <button type="button" class="note-color-btn selected" data-color="" style="background:var(--bg-tertiary)" title="Varsayılan"></button>
              <button type="button" class="note-color-btn" data-color="#7c5cfc" style="background:#7c5cfc" title="Mor"></button>
              <button type="button" class="note-color-btn" data-color="#f472b6" style="background:#f472b6" title="Pembe"></button>
              <button type="button" class="note-color-btn" data-color="#fbbf24" style="background:#fbbf24" title="Sarı"></button>
              <button type="button" class="note-color-btn" data-color="#34d399" style="background:#34d399" title="Yeşil"></button>
              <button type="button" class="note-color-btn" data-color="#60a5fa" style="background:#60a5fa" title="Mavi"></button>
              <button type="button" class="note-color-btn" data-color="#f87171" style="background:#f87171" title="Kırmızı"></button>
              <button type="button" class="note-color-btn" data-color="#fb923c" style="background:#fb923c" title="Turuncu"></button>
            </div>
          </div>
          <div class="note-option-group">
            <label>Etiketler</label>
            <input type="text" id="input-note-tags" placeholder="Virgülle ayırın: ödev, sınav..." maxlength="120" autocomplete="off">
          </div>
          <div class="note-option-group note-pin-group">
            <label for="note-pin-toggle">Sabitle</label>
            <button type="button" class="note-pin-btn" id="note-pin-toggle" title="Notu üste sabitle">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V5a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v5.76z"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" id="btn-delete-note" style="margin-right:auto;display:none">Sil</button>
        <button class="btn btn-ghost" id="btn-cancel-note">İptal</button>
        <button class="btn btn-primary" id="btn-confirm-note">Kaydet</button>
      </div>
    </div>
  </div>

  <!-- Modal for adding category -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-add-category">
      <div class="modal-header">
        <h2 id="cat-modal-title">Yeni Kategori</h2>
        <button class="modal-close" id="modal-close" aria-label="Kapat">&times;</button>
      </div>
      <div class="modal-body">
        <label for="input-category-name">Kategori Adı</label>
        <input type="text" id="input-category-name" placeholder="Örn: Namaz, Çalışma, Egzersiz..." maxlength="40" autocomplete="off">
        <label for="input-category-color">Vurgu Rengi</label>
        <div class="color-picker" id="color-picker">
          <!-- Generated by JS -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-cancel-category">İptal</button>
        <button class="btn btn-primary" id="btn-confirm-category">Oluştur</button>
      </div>
    </div>
  </div>

  <!-- Modal for adding task -->
  <div class="modal-overlay" id="modal-task-overlay">
    <div class="modal" id="modal-add-task">
      <div class="modal-header">
        <h2 id="task-modal-title">Yeni Görev</h2>
        <button class="modal-close" id="modal-task-close" aria-label="Kapat">&times;</button>
      </div>
      <div class="modal-body">
        <label for="input-task-name">Görev Adı</label>
        <input type="text" id="input-task-name" placeholder="Örn: Sabah koşusu, 30 dk okuma..." maxlength="60" autocomplete="off">
        <label>Aktif Günler <span class="label-hint">(boş bırakırsan her gün)</span></label>
        <div class="day-picker" id="day-picker">
          <button type="button" class="day-chip day-chip-all" data-day="all">Tümü</button>
          <button type="button" class="day-chip" data-day="1">Pzt</button>
          <button type="button" class="day-chip" data-day="2">Sal</button>
          <button type="button" class="day-chip" data-day="3">Çar</button>
          <button type="button" class="day-chip" data-day="4">Per</button>
          <button type="button" class="day-chip" data-day="5">Cum</button>
          <button type="button" class="day-chip" data-day="6">Cmt</button>
          <button type="button" class="day-chip" data-day="0">Paz</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-cancel-task">İptal</button>
        <button class="btn btn-primary" id="btn-confirm-task">Görev Ekle</button>
      </div>
    </div>
  </div>
  <!-- History Detail Modal -->
  <div class="modal-overlay" id="modal-history-overlay">
    <div class="modal modal-wide" id="modal-history-detail">
      <div class="modal-header">
        <h2 id="history-detail-title">Hafta Detayı</h2>
        <button class="modal-close" id="modal-history-close" aria-label="Kapat">&times;</button>
      </div>
      <div class="modal-body">
        <div class="history-detail-summary" id="history-detail-summary"></div>
        <div class="history-detail-table-wrap">
          <table class="history-detail-table" id="history-detail-table"></table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-close-history-detail">Kapat</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
